<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rustin Jahree Cereno | Portfolio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>


    <header class="header">
        <div class="container">
            <div class="navbar">
                <div class="nav-brand">
                    <h1 id="navBrandName">Cereno, Rustin Jahree F.</h1>
                </div>

                <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <nav class="nav-menu" id="navMenu">
                    <ul>
                        <li><a href="#hero">Home</a></li>
                        <li><a href="#about">About</a></li>
                        <li><a href="#skills">Skills</a></li>
                        <li><a href="#projects">Projects</a></li>
                        <li><a href="#education">Education</a></li>
                        <li><a href="#contact">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>

        <section id="hero" class="hero">
            <h2 style="display: none;">Welcome</h2>
            <div class="hero-content">
                <!-- All rendered from JSON -->
                <div id="heroContainer"></div>
            </div>
        </section>

        <section id="about" class="about">
            <div class="container">
                <h2>About Me</h2>
                <div id="aboutContainer"></div>
            </div>
        </section>

        <section id="skills" class="skills">
            <div class="container">
                <h2>Skills</h2>
                <div id="skillsContainer" class="skills-grid">
                </div>
            </div>
        </section>

        <section id="projects" class="projects">
            <div class="container">
                <h2>Featured Projects</h2>
                <div id="projectsContainer" class="projects-grid">
                </div>
            </div>
        </section>

        <section id="education" class="education">
            <div class="container">
                <h2>Education & Certifications</h2>
                <div id="educationContainer" class="timeline">
                </div>
            </div>
        </section>


        <section id="contact" class="contact">
            <div class="container">
                <h2>Get In Touch</h2>
                <div id="contactContainer" class="contact-content">

                </div>
            </div>
        </section>

    </main>


    <footer class="footer">
        <div class="container">
            <div id="footerContainer"></div>
        </div>
    </footer>

    <script src="js/script.js" defer></script>

</body>

</html>
